name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Connect to GitHub Environment
    environment: dev

    steps:
      # 1️⃣ Checkout deployment repo
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      # 2️⃣ Read version
      - name: Read version
        run: |
          VERSION=$(grep version dev/version.yml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"

      # 3️⃣ Checkout frontend repo by tag
      - name: Checkout frontend repo by tag
        uses: actions/checkout@v4
        with:
          repository: Vijay-Kumar-22/frontend
          ref: ${{ env.VERSION }}
          token: ${{ secrets.PAT_TOKEN }}
          path: frontend

      # 4️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 5️⃣ Install dependencies
      - name: Install dependencies
        run: cd frontend && npm ci

      # 6️⃣ Build project
      - name: Build project
        run: cd frontend && npm run build

      # 7️⃣ Debug secret (optional)
      - name: Debug API_BASE_URL
        run: echo "${{ secrets.API_BASE_URL }}" | wc -c

      # 8️⃣ Generate runtime env.js
      - name: Generate env.js
        run: |
          echo "window.__ENV__ = {" > env.js
          echo "  VITE_API_BASE_URL: '${{ secrets.API_BASE_URL }}'," >> env.js
          echo "  VITE_API_TIMEOUT: '${{ secrets.API_TIMEOUT }}'," >> env.js
          echo "  VITE_ENABLE_REDUX_DEVTOOLS: '${{ secrets.ENABLE_REDUX_DEVTOOLS }}'," >> env.js
          echo "  VITE_ENABLE_LOGGING: '${{ secrets.ENABLE_LOGGING }}'," >> env.js
          echo "  VITE_ENABLE_DEBUG: '${{ secrets.ENABLE_DEBUG }}'" >> env.js
          echo "};" >> env.js

      # 9️⃣ Upload React build to S3
      - name: Upload static files to S3
        run: aws s3 sync frontend/dist/ s3://frontend-qa2 --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # 🔟 Upload env.js
      - name: Upload env.js
        run: aws s3 cp env.js s3://frontend-qa2/env.js --cache-control "no-store"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # 1️⃣1️⃣ Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id E3B8AJR34RKP39 \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "Created Invalidation: $INVALIDATION_ID"

          aws cloudfront wait invalidation-completed \
            --distribution-id E3B8AJR34RKP39 \
            --id $INVALIDATION_ID

          echo "CloudFront invalidation completed."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
